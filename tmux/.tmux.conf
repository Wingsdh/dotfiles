# ====================================
# === Basic Configuration / 基础配置 ===
# ====================================
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -sg escape-time 0
set-option -g repeat-time 0
set-option -g status-interval 1
set -g history-limit 50000
set -g focus-events on
set -g default-command "${SHELL}"

# ==============================================
# === Mouse & Keyboard Setup / 鼠标和键盘设置 ===
# ==============================================
set -g mouse on
setw -g mode-keys vi
set -g prefix 'C-f'

# =========================================
# === Copy Mode / 复制模式 ===
# =========================================
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# ================================================
# === Window & Pane Management / 窗口和面板管理 ===
# ================================================
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# 新窗口/分屏继承当前路径
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# =====================================
# === Status Bar / 状态栏 ===
# =====================================
set-option -g status-position top
set -g status-left-length 100
set -g status-right-length 100

# =======================================
# === Plugins / 插件 ===
# =======================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# 面板导航与调整
set -g @plugin 'tmux-plugins/tmux-pain-control'

# 复制增强
set -g @plugin 'tmux-plugins/tmux-yank'
set-option -g set-clipboard on

# 会话持久化
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# 搜索与跳转
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-r"
set -g @plugin 'roosta/tmux-fuzzback'
set-option -g @plugin "roy2220/easyjump.tmux"
set -g @easy-motion-prefix "Space"

# 窗口自动命名（需要 pip install libtmux）
set -g @plugin 'ofirgall/tmux-window-name'

# 状态栏主题与信息
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'o0th/tmux-nova'

# =====================================
# === Nova Theme (Nord palette) ===
# =====================================
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left ""
set -g @nova-nerdfonts-right ""

set -g @nova-pane-active-border-style "#44475a"
set -g @nova-pane-border-style "#282a36"
set -g @nova-status-style-bg "#4c566a"
set -g @nova-status-style-fg "#d8dee9"
set -g @nova-status-style-active-bg "#89c0d0"
set -g @nova-status-style-active-fg "#2e3540"
set -g @nova-status-style-double-bg "#2d3540"

set -g @nova-pane "#I#{?pane_in_mode, #{pane_mode},} #W"
set -g @nova-segment-mode "#S"
set -g @nova-segment-mode-colors "#78a2c1 #2e3440"
set -g @nova-segment-whoami "%Y-%m-%d %H:%M"
set -g @nova-segment-whoami-colors "#78a2c1 #2e3440"

set -g @nova-segment-battery " #(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh)"
set -g @nova-segment-battery-colors "#78a2c1 #2e3440"
set -g @nova-segment-cpu " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"
set -g @nova-segment-cpu-colors "#78a2c1 #2e3440"

set -g @nova-padding 0
set -g @nova-segment-tip "#(~/.config/tmux/tip-bar.sh)"
set -g @nova-segment-tip-colors "#4c566a #d8dee9"

set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "tip cpu battery whoami"

# =====================================
# === Sesh Session Switcher / 会话切换 ===
# =====================================
bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% --no-sort \
    --ansi --border-label ' sesh ' \
    --prompt '  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
)\""

# C-f S 触发 sesh（prefix + S）
bind-key "S" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% --no-sort \
    --ansi --border-label ' sesh ' \
    --prompt '  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
)\""

# =========================================
# === Claude Code Keybindings / AI 快捷键 ===
# =========================================
bind C-c new-window -n "cc" -c "#{pane_current_path}" "claude --model sonnet"
bind C-o new-window -n "cc-opus" -c "#{pane_current_path}" "claude --model opus"
bind C-h new-window -n "cc-haiku" -c "#{pane_current_path}" "claude --model haiku"

# =========================================
# === TPM Init (必须在最底部) ===
# =========================================
run '~/.tmux/plugins/tpm/tpm'

# 覆盖插件绑定（必须在 TPM 之后）
bind-key "b" run-shell "sesh last"
set-option -g detach-on-destroy off
